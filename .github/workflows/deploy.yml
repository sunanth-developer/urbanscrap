name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: cp index.dev.html index.html && npm run build

      - name: Publish built site to main branch root
        run: |
          rm -rf assets
          cp dist/index.html index.html
          cp -r dist/assets assets
          cp dist/favicon.svg dist/icons.svg dist/.nojekyll .

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets index.html favicon.svg icons.svg .nojekyll
          git diff --staged --quiet || git commit -m "Deploy production assets for GitHub Pages"
          git push
